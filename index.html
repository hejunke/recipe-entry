<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>菜品配方录入系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:10px}
.container{max-width:1200px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;text-align:center}
.header h1{font-size:22px;margin-bottom:6px}
.header p{font-size:13px;opacity:.9}
.content{padding:15px}
.page{display:none}.page.active{display:block}
.dept-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:15px}
.dept-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;border-radius:10px;text-align:center;cursor:pointer;transition:transform .2s}
.dept-card:active{transform:scale(.97)}
.dept-card h2{font-size:22px;margin-bottom:8px}
.dept-card .count{font-size:42px;font-weight:bold;margin:10px 0}
.dept-card .label{font-size:13px;opacity:.9}
.back-btn{background:#667eea;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:15px}
.dish-list{margin-top:15px}
.dish-item{background:#f8f9fa;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.dish-info h3{font-size:15px;margin-bottom:3px;color:#333}
.dish-info p{color:#666;font-size:12px}
.fill-btn{background:#28a745;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;width:100%}
.fill-btn.filled{background:#6c757d}
.dish-actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.dish-actions .opt-btn{flex:1;min-width:120px;padding:6px 10px;border:2px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;color:#666}
.dish-actions .opt-btn.active{background:#28a745;color:#fff;border-color:#28a745}
.dish-actions .opt-btn.active.stop{background:#dc3545;border-color:#dc3545}
.recipe-form{background:#f8f9fa;padding:15px;border-radius:10px;margin-top:15px}
.recipe-form h2{margin-bottom:15px;color:#333;font-size:18px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:bold;color:#555;font-size:14px}
.form-group input,.form-group select{width:100%;padding:10px;border:2px solid #ddd;border-radius:6px;font-size:14px}
.ingredient-row{padding:12px;background:#fff;border-radius:8px;border:1px solid #e9ecef;margin-bottom:8px;position:relative}
.ingredient-row .row-top{display:grid;grid-template-columns:1fr 80px 80px;gap:6px;align-items:center}
.ingredient-row .row-btns{display:flex;gap:6px;margin-top:6px}
.ingredient-search{position:relative}
.ingredient-search input{width:100%;padding:10px;border:2px solid #ddd;border-radius:6px;font-size:14px}
.ingredient-search input:focus{border-color:#667eea;outline:none}
.ingredient-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-top:none;max-height:200px;overflow-y:auto;z-index:100;display:none;border-radius:0 0 6px 6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.ingredient-dropdown.show{display:block}
.ingredient-dropdown div{padding:10px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0}
.ingredient-dropdown div:hover{background:#f0f4ff}
.ingredient-dropdown .empty{padding:10px;color:#999;text-align:center}
.remove-btn{background:#dc3545;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;flex:1}
.add-btn{background:#17a2b8;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:15px;width:100%}
.submit-btn{background:#28a745;color:#fff;border:none;padding:12px;border-radius:6px;cursor:pointer;font-size:15px;width:100%;margin-top:15px}
.status-options{margin-top:12px;padding:12px;background:#fff;border-radius:8px;border:1px solid #e9ecef}
.status-options .opt-title{font-weight:bold;margin-bottom:8px;color:#555;font-size:14px}
.status-options .opt-row{display:flex;gap:10px}
.status-options .opt-row label{flex:1;display:flex;align-items:center;gap:6px;padding:8px;border:2px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px;font-weight:normal}
.status-options .opt-row label.checked-green{border-color:#28a745;background:#e8f5e9;color:#28a745}
.status-options .opt-row label.checked-red{border-color:#dc3545;background:#ffebee;color:#dc3545}
.status-options .opt-row input{width:auto;margin:0}
.admin-btn{position:fixed;bottom:15px;right:15px;background:#dc3545;color:#fff;border:none;padding:10px 18px;border-radius:50px;cursor:pointer;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:1000}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:15px;border-radius:10px;text-align:center}
.stat-card .number{font-size:28px;font-weight:bold;margin:8px 0}
.stat-card .label{font-size:12px;opacity:.9}
.tab-buttons{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:80px;background:#e9ecef;color:#495057;border:none;padding:10px 6px;border-radius:6px;cursor:pointer;font-size:12px}
.tab-btn.active{background:#667eea;color:#fff}
.tab-content{display:none}.tab-content.active{display:block}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;min-width:500px}
th{background:#667eea;color:#fff;padding:10px;text-align:left;font-size:12px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #e9ecef;font-size:12px}
tr:hover{background:#f8f9fa}
.status-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:bold}
.status-badge.pending{background:#fff3cd;color:#856404}
.status-badge.completed{background:#d4edda;color:#155724}
.status-badge.stopped{background:#f8d7da;color:#721c24}
.action-btn{padding:4px 8px;border:none;border-radius:4px;cursor:pointer;font-size:11px;margin-right:4px}
.action-btn.return{background:#ffc107;color:#000}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:2000;padding:10px;overflow-y:auto}
.modal.active{display:block}
.modal-content{background:#fff;padding:15px;border-radius:10px;margin:10px auto;max-width:900px}
.close-btn{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#999}
.search-box{width:100%;padding:10px;border:2px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:10px}
@media(min-width:768px){
body{padding:20px}
.header h1{font-size:28px}
.header p{font-size:15px}
.content{padding:30px}
.dept-grid{grid-template-columns:repeat(3,1fr);gap:20px}
.dept-card{padding:35px}
.dept-card h2{font-size:26px}
.dept-card .count{font-size:48px}
.dish-item{flex-direction:row;justify-content:space-between;align-items:center;padding:15px}
.fill-btn{width:auto}
}
</style>
</head>

<h1>🍳 菜品配方录入系统</h1>
<p>年顺渔村东坑店</p>
</div>
<div class="content">
<!-- 部门选择页面 -->
<div id="page-dept" class="page active">
<h2 style="text-align:center;margin-bottom:8px">请选择部门</h2>
<p style="text-align:center;color:#666;font-size:13px">选择您要录入配方的部门</p>
<div class="dept-grid">
<div class="dept-card" onclick="selectDept('中厨')">
<h2>🔥 中厨</h2>

<div class="label">待录入菜品</div>
</div>
<div class="dept-card" onclick="selectDept('点心')">
<h2>🥟 点心</h2>
<div class="count" id="count-点心">0</div>
<div class="label">待录入菜品</div>
</div>
<div class="dept-card" onclick="selectDept('味部')">
<h2>🍜 味部</h2>
<div class="count" id="count-味部">0</div>
<div class="label">待录入菜品</div>
</div>
</div>
</div>

<!-- 菜品列表页面 -->
<div id="page-dishes" class="page">
<button class="back-btn" onclick="showPage('page-dept')">← 返回部门选择</button>
<h2 id="dept-title" style="margin-bottom:10px">待录入菜品</h2>
<input type="text" id="search-input" class="search-box" placeholder="搜索菜品名称..." oninput="filterDishes()">
<button class="admin-btn" onclick="showAdmin()">📊 后台管理</button>
<div class="dish-list" id="dish-list"></div>
</div>

<!-- 配方填写页面 -->
<div id="page-recipe" class="page">
<button class="back-btn" onclick="showPage('page-dishes')">← 返回菜品列表</button>
<div class="recipe-form">
<h2 id="recipe-title">填写配方</h2>
<div class="form-group">
<label>主料</label>
<div id="ingredients-list"></div>
<button class="add-btn" onclick="addIngredient()">+ 添加主料</button>
</div>
<div class="form-group">
<label>调料费（元）</label>
<input type="number" id="seasoning-cost" step="0.01" placeholder="请输入调料费用">
</div>
<div class="status-options">
<div class="opt-title">状态选项</div>
<div class="opt-row">
<label id="label-completed">
<input type="checkbox" id="check-completed" onchange="toggleStatus('completed')">
<span>已填写配方</span>
</label>
<label id="label-stopped">
<input type="checkbox" id="check-stopped" onchange="toggleStatus('stopped')">
<span>不再售卖</span>
</label>
</div>
</div>
<button class="submit-btn" onclick="submitRecipe()">保存</button>
</div>
</div>
</div>
</div>

<!-- 后台管理模态框 -->
<div id="admin-modal" class="modal">
<div class="modal-content">
<button class="close-btn" onclick="closeAdmin()">✕</button>
<h2 style="margin-bottom:15px">📊 后台数据管理</h2>
<div class="stats-grid">
<div class="stat-card"><div class="label">总菜品数</div><div class="number" id="stat-total">0</div></div>
<div class="stat-card"><div class="label">已填写</div><div class="number" id="stat-completed">0</div></div>
<div class="stat-card"><div class="label">不再售卖</div><div class="number" id="stat-stopped">0</div></div>
<div class="stat-card"><div class="label">待录入</div><div class="number" id="stat-pending">0</div></div>
</div>
<div class="tab-buttons">
<button class="tab-btn active" onclick="switchTab('tab-pending')">待录入</button>
<button class="tab-btn" onclick="switchTab('tab-completed')">已录入</button>
<button class="tab-btn" onclick="switchTab('tab-stopped')">已停售</button>
</div>
<div id="tab-pending" class="tab-content active"></div>
<div id="tab-completed" class="tab-content"></div>
<div id="tab-stopped" class="tab-content"></div>
</div>
</div>

function init() {

            dept: d.dept,
            category: d.category,

// ===== 云端同步 =====
async function loadFromCloud() {
    try {
        var response = await fetch(SUPABASE_URL + '/rest/v1/recipes?select=*', {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
        });
        
        if (response.ok) {
            var cloudData = await response.json();
            // 用云端数据更新本地状态
            cloudData.forEach(function(cloud) {
                var local = allDishes.find(function(d) { return d.code === cloud.code; });
                if (local) {
                    local.status = cloud.status || 'pending';
                    local.ingredients = cloud.ingredients || [];
                    local.seasoning_cost = cloud.seasoning_cost || 0;
                }
            });
            console.log('云端数据同步成功');
            // 刷新当前页面
            if (document.getElementById('page-dishes').classList.contains('active')) {
                renderDishList();
            }
            updateCounts();
        }
    } catch(e) {
        console.log('云端同步失败，使用本地数据');
    }
}

            body: JSON.stringify({
                status: dish.status,
                ingredients: dish.ingredients,
                seasoning_cost: dish.seasoning_cost,
                updated_at: new Date().toISOString()
            })
        });
        
        if (response.ok) {
            console.log('云端保存成功');
            return true;
        } else {
            console.log('云端保存失败:', response.status);
            return false;
        }
    } catch(e) {
        console.log('云端保存异常:', e);
        return false;
    }
}

// ===== 页面导航 =====
function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    if (id === 'page-dishes') renderDishList();
}

function selectDept(dept) {
    currentDept = dept;
    document.getElementById('dept-title').textContent = dept + ' - 待录入菜品';
    showPage('page-dishes');
}

// ===== 菜品列表 =====
function getDeptDishes() {
    return allDishes.filter(function(d) { return d.dept === currentDept; });
}

function updateCounts() {
    ['中厨','点心','味部'].forEach(function(dept) {
        var count = allDishes.filter(function(d) { return d.dept === dept && d.status === 'pending'; }).length;
        document.getElementById('count-' + dept).textContent = count;
    });
}

function renderDishList() {
    var list = document.getElementById('dish-list');
    var search = document.getElementById('search-input').value.toLowerCase();
    var dishes = getDeptDishes();
    
    if (search) {
        dishes = dishes.filter(function(d) { return d.name.toLowerCase().indexOf(search) >= 0; });
    }
    
    dishes.sort(function(a, b) {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.name.localeCompare(b.name);
    });
    
    if (dishes.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:#666">没有找到菜品</div>';
        return;
    }
    
    var html = '';
    var lastCat = '';
    dishes.forEach(function(d) {
        if (d.category !== lastCat) {
            html += '<h3 style="margin:15px 0 8px;color:#667eea;font-size:14px">' + d.category + '</h3>';
            lastCat = d.category;
        }
        var statusClass = d.status === 'completed' ? 'filled' : '';
        var statusText = d.status === 'completed' ? '✓ 已填写' : d.status === 'stopped' ? '✗ 已停售' : '填写配方';
        html += '<div class="dish-item">' +
            '<div class="dish-info">' +
            '<h3>' + d.name + '</h3>' +
            '<p>编号: ' + d.code + ' | 单位: ' + d.unit + '</p>' +
            '</div>' +
            '<button class="fill-btn ' + statusClass + '" onclick="openRecipe(\'' + d.code + '\')">' + statusText + '</button>' +
            '</div>';
    });
    list.innerHTML = html;
    updateCounts();
}

function filterDishes() { renderDishList(); }

// ===== 配方填写 =====
function openRecipe(code) {
    currentDish = allDishes.find(function(d) { return d.code === code; });
    if (!currentDish) return;
    
    document.getElementById('recipe-title').textContent = '填写配方 - ' + currentDish.name;
    currentIngredients = currentDish.ingredients ? JSON.parse(JSON.stringify(currentDish.ingredients)) : [];
    document.getElementById('seasoning-cost').value = currentDish.seasoning_cost || '';
    
    document.getElementById('check-completed').checked = currentDish.status === 'completed';
    document.getElementById('check-stopped').checked = currentDish.status === 'stopped';
    updateStatusUI();
    
    renderIngredients();
    showPage('page-recipe');
}

function renderIngredients() {
    var list = document.getElementById('ingredients-list');
    if (currentIngredients.length === 0) {
        list.innerHTML = '<p style="color:#999;font-size:13px">暂无主料，点击下方按钮添加</p>';
        return;
    }
    
    var html = '';
    currentIngredients.forEach(function(ing, i) {
        html += '<div class="ingredient-row">' +
            '<div class="row-top">' +
            '<div class="ingredient-search">' +
            '<input type="text" value="' + (ing.name || '') + '" placeholder="搜索物料..." oninput="searchMaterial(this, ' + i + ')" onfocus="searchMaterial(this, ' + i + ')">' +
            '<div class="ingredient-dropdown" id="dropdown-' + i + '"></div>' +
            '</div>' +
            '<input type="number" step="0.01" value="' + (ing.qty || '') + '" placeholder="数量" onchange="updateIng(' + i + ',\'qty\',this.value)">' +
            '<input type="text" value="' + (ing.unit || '') + '" placeholder="单位" onchange="updateIng(' + i + ',\'unit\',this.value)">' +
            '</div>' +
            '<div class="row-btns">' +
            '<button class="remove-btn" onclick="removeIngredient(' + i + ')">删除</button>' +
            '</div>' +
            '</div>';
    });
    list.innerHTML = html;
}

function addIngredient() {
    currentIngredients.push({ name: '', qty: '', unit: '' });
    renderIngredients();
}

function removeIngredient(i) {
    currentIngredients.splice(i, 1);
    renderIngredients();
}

function updateIng(i, field, val) {
    if (currentIngredients[i]) currentIngredients[i][field] = val;
}

function searchMaterial(input, idx) {
    var keyword = input.value.toLowerCase();
    var dropdown = document.getElementById('dropdown-' + idx);
    
    if (!keyword) { dropdown.classList.remove('show'); return; }
    
    var matches = MATERIALS.filter(function(m) { return m.toLowerCase().indexOf(keyword) >= 0; }).slice(0, 10);
    
    if (matches.length === 0) {
        dropdown.innerHTML = '<div class="empty">未找到匹配物料</div>';
    } else {
        dropdown.innerHTML = matches.map(function(m) {
            return '<div onclick="selectMaterial(' + idx + ',\'' + m.replace(/'/g, "\\'") + '\')">' + m + '</div>';
        }).join('');
    }
    dropdown.classList.add('show');
}

function selectMaterial(idx, name) {
    currentIngredients[idx].name = name;
    renderIngredients();
}

function toggleStatus(type) {
    var completed = document.getElementById('check-completed');
    var stopped = document.getElementById('check-stopped');
    
    if (type === 'completed' && completed.checked) {
        stopped.checked = false;
    } else if (type === 'stopped' && stopped.checked) {
        completed.checked = false;
    }
    updateStatusUI();
}

function updateStatusUI() {
    var completed = document.getElementById('check-completed').checked;
    var stopped = document.getElementById('check-stopped').checked;
    
    document.getElementById('label-completed').className = completed ? 'checked-green' : '';
    document.getElementById('label-stopped').className = stopped ? 'checked-red' : '';
}

// ===== 保存 =====
async function submitRecipe() {
    if (!currentDish) return;
    
    var hasIngredients = currentIngredients.some(function(i) { return i.name; });
    var isCompleted = document.getElementById('check-completed').checked;
    var isStopped = document.getElementById('check-stopped').checked;
    
    if (isCompleted && !hasIngredients) {
        alert('请至少添加一个主料，或取消"已填写配方"状态');
        return;
    }
    
    var status = 'pending';
    if (isCompleted) status = 'completed';
    if (isStopped) status = 'stopped';
    
    // 更新本地数据
    var idx = allDishes.findIndex(function(d) { return d.code === currentDish.code; });
    if (idx >= 0) {
        allDishes[idx].status = status;
        allDishes[idx].ingredients = currentIngredients.filter(function(i) { return i.name; });
        allDishes[idx].seasoning_cost = parseFloat(document.getElementById('seasoning-cost').value) || 0;
    }
    
    // 保存到云端
    var saved = await saveToCloud(allDishes[idx]);
    
    if (saved) {
        alert('保存成功！');
    } else {
        alert('保存失败，请重试');
    }
    
    showPage('page-dishes');
}

// ===== 后台管理 =====
function showAdmin() {
    updateStats();
    renderAdminTabs();
    document.getElementById('admin-modal').classList.add('active');
}

function closeAdmin() {
    document.getElementById('admin-modal').classList.remove('active');
}

function updateStats() {
    document.getElementById('stat-total').textContent = allDishes.length;
    document.getElementById('stat-completed').textContent = allDishes.filter(function(d) { return d.status === 'completed'; }).length;
    document.getElementById('stat-stopped').textContent = allDishes.filter(function(d) { return d.status === 'stopped'; }).length;
    document.getElementById('stat-pending').textContent = allDishes.filter(function(d) { return d.status === 'pending'; }).length;
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

function renderAdminTabs() {
    renderAdminTable('tab-pending', 'pending');
    renderAdminTable('tab-completed', 'completed');
    renderAdminTable('tab-stopped', 'stopped');
}

function renderAdminTable(containerId, status) {
    var container = document.getElementById(containerId);
    var dishes = allDishes.filter(function(d) { return d.status === status; });
    
    if (dishes.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#999;padding:20px">暂无数据</p>';
        return;
    }
    
    var html = '<div class="table-wrap"><table><thead><tr>' +
        '<th>部门</th><th>分类</th><th>菜品名称</th><th>编号</th><th>主料数</th><th>调料费</th>' +
        '</tr></thead><tbody>';
    
    dishes.forEach(function(d) {
        var ingCount = d.ingredients ? d.ingredients.length : 0;
        var cost = d.seasoning_cost ? '¥' + d.seasoning_cost.toFixed(2) : '-';
        html += '<tr>' +
            '<td>' + d.dept + '</td>' +
            '<td>' + d.category + '</td>' +
            '<td>' + d.name + '</td>' +
            '<td>' + d.code + '</td>' +
            '<td>' + ingCount + '</td>' +
            '<td>' + cost + '</td>' +
            '</tr>';
    });
    
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

// ===== 启动 =====
init();
</script>
</body>
</html>
